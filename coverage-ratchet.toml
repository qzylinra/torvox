[crates.torvox-core]
threshold = 45.0
target = 60.0

[crates.torvox-terminal]
threshold = 30.0
target = 60.0

[crates.torvox-renderer]
threshold = 25.0
target = 60.0

[crates.torvox-gui-android]
threshold = 15.0
target = 50.0

[crates.torvox-integration-tests]
threshold = 15.0
