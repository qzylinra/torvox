[workspace]
initial_threshold = 25.0
target_threshold = 60.0
ratchet_increment = 1.0

[crates.terminal-core]
threshold = 45.0
target = 60.0

[crates.terminal-engine]
threshold = 30.0
target = 60.0

[crates.gpu-renderer]
threshold = 25.0
target = 60.0

[crates.android-gui]
threshold = 15.0
target = 50.0

[crates.integration-tests]
threshold = 15.0
target = 50.0

[crates.mcp-server]
threshold = 20.0
target = 55.0

[ratchet]
enabled = true
auto_bump = true
require_clean_ci = true

[cargo-llvm-cov]
exclude_lines = ["mod tests", "unreachable!", "todo!"]
