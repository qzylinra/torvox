name: Nightly
on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
jobs:
  fuzz:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [vt_parser, osc_parser, utf8_parser]
    steps:
      - uses: actions/checkout@main
      - uses: dtolnay/rust-toolchain@nightly
      - run: |
          cargo install cargo-fuzz
          cargo fuzz run ${{ matrix.target }} -- -max_total_time=3600
      - if: failure()
        uses: actions/upload-artifact@master
        with:
          name: fuzz-crash-${{ matrix.target }}
          path: fuzz/artifacts/
  miri:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@main
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri
      - run: |
          MIRIFLAGS="-Zmiri-tag-raw-pointers" cargo miri test -p torvox-core
          MIRIFLAGS="-Zmiri-tag-raw-pointers" cargo miri test -p torvox-terminal
  bench:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@main
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo bench --workspace
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@main
      - run: |
          cargo install cargo-audit
          cargo audit
