name: Release
on:
  push:
    tags: ['v*']
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@main
      - uses: actions/checkout@main
        with:
          repository: ${{ github.actor }}/kudzu
          path: result-kudzu
      - uses: ./result-kudzu/.github/actions/install-nix
      - uses: cachix/cachix-action@master
        continue-on-error: true
        with:
          name: ${{ secrets.CACHIX_NAME }}
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - run: |
          rm -f ~/.config/nix/nix.conf
          scripts/build-android-libs.nu --profile release
        env:
          NIXPKGS_ALLOW_UNFREE: "1"
          NIXPKGS_ALLOW_INSECURE: "1"
          NIXPKGS_ACCEPT_ANDROID_SDK_LICENSE: "1"
      - run: scripts/build-apk.nu --release
        env:
          NIXPKGS_ALLOW_UNFREE: "1"
          NIXPKGS_ALLOW_INSECURE: "1"
          NIXPKGS_ACCEPT_ANDROID_SDK_LICENSE: "1"
      - uses: actions/upload-artifact@main
        with:
          name: torvox-release-apk
          path: android/app/build/outputs/apk/release/*.apk
      - run: scripts/build-apk.nu --debug
        env:
          NIXPKGS_ALLOW_UNFREE: "1"
          NIXPKGS_ALLOW_INSECURE: "1"
          NIXPKGS_ACCEPT_ANDROID_SDK_LICENSE: "1"
      - uses: actions/upload-artifact@main
        with:
          name: torvox-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
      - run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - uses: reactivecircus/android-emulator-runner@v2
        env:
          NIXPKGS_ALLOW_UNFREE: "1"
          NIXPKGS_ALLOW_INSECURE: "1"
          NIXPKGS_ACCEPT_ANDROID_SDK_LICENSE: "1"
        with:
          api-level: 35
          target: default
          arch: x86_64
          profile: pixel_7_pro
          ram-size: 2048M
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none -no-snapshot
          disable-animations: true
          pre-emulator-launch-script: |
            adb kill-server || true
            fuser -k 5037/tcp 5554/tcp 5555/tcp 2>/dev/null || true
            sleep 2
            adb start-server
            sleep 2
            adb get-state 2>/dev/null || true
          script: |
            set -e
            nix develop --command nu ${{ github.workspace }}/scripts/test-emulator.nu
      - uses: actions/upload-artifact@main
        if: always()
        with:
          name: emulator-results
          path: |
            /tmp/torvox-emu-results/
            ~/.maestro/reports/
      - uses: softprops/action-gh-release@master
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          generate_release_notes: false
          files: android/app/build/outputs/apk/release/*.apk
