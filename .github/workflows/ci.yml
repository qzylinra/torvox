name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
jobs:
  rust-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@main
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.95.0"
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@master
      - run: |
          curl -L "https://ziglang.org/download/0.15.2/zig-x86_64-linux-0.15.2.tar.xz" -o /tmp/zig.tar.xz
          tar -xf /tmp/zig.tar.xz -C /tmp
          echo "/tmp/zig-x86_64-linux-0.15.2" >> $GITHUB_PATH
          git clone --depth 1 https://github.com/Uzaaft/libghostty-rs.git libghostty-rs-patch
          cd libghostty-rs-patch && git apply ../patches/libghostty-vt-android.patch
      - run: |
          cargo fmt --check
          cargo clippy --all-targets --all-features -- -D warnings
      - uses: taiki-e/install-action@main
        with:
          tool: nextest
      - run: |
          cargo nextest run --workspace
          QUICKCHECK_TESTS=10000 cargo test --workspace
          cargo test --workspace -- proptest
      - run: |
          cargo install cargo-audit
          cargo audit
      - run: |
          cargo install cargo-geiger
          cd torvox-core && cargo geiger
        continue-on-error: true
  no-std-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@main
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.95.0"
          targets: thumbv6m-none-eabi
      - run: |
          curl -L "https://ziglang.org/download/0.15.2/zig-x86_64-linux-0.15.2.tar.xz" -o /tmp/zig.tar.xz
          tar -xf /tmp/zig.tar.xz -C /tmp
          echo "/tmp/zig-x86_64-linux-0.15.2" >> $GITHUB_PATH
          git clone --depth 1 https://github.com/Uzaaft/libghostty-rs.git libghostty-rs-patch
          cd libghostty-rs-patch && git apply ../patches/libghostty-vt-android.patch
      - run: cargo build -p torvox-core --target thumbv6m-none-eabi --no-default-features --features alloc
  android-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@main
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.95.0"
          targets: x86_64-unknown-linux-gnu
      - run: |
          curl -L "https://ziglang.org/download/0.15.2/zig-x86_64-linux-0.15.2.tar.xz" -o /tmp/zig.tar.xz
          tar -xf /tmp/zig.tar.xz -C /tmp
          echo "/tmp/zig-x86_64-linux-0.15.2" >> $GITHUB_PATH
          git clone --depth 1 https://github.com/Uzaaft/libghostty-rs.git libghostty-rs-patch
          cd libghostty-rs-patch && git apply ../patches/libghostty-vt-android.patch
      - uses: Swatinem/rust-cache@master
        with:
          key: android-checks
      - run: cargo build -p torvox-gui-android
      - run: |
          if ! command -v boltffi &>/dev/null; then cargo install boltffi_cli --version 0.25.2; fi
          boltffi --help
      - uses: actions/setup-java@main
        with:
          distribution: temurin
          java-version: 17
      - uses: android-actions/setup-android@main
      - working-directory: android
        run: |
          ./gradlew lint --quiet
          ./gradlew test --quiet
  android-emulator-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@main
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.95.0"
          targets: x86_64-linux-android
      - run: |
          curl -L "https://ziglang.org/download/0.15.2/zig-x86_64-linux-0.15.2.tar.xz" -o /tmp/zig.tar.xz
          tar -xf /tmp/zig.tar.xz -C /tmp
          echo "/tmp/zig-x86_64-linux-0.15.2" >> $GITHUB_PATH
          git clone --depth 1 https://github.com/Uzaaft/libghostty-rs.git libghostty-rs-patch
          cd libghostty-rs-patch && git apply ../patches/libghostty-vt-android.patch
      - run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - run: cargo install cargo-ndk@4.1.2
      - uses: Swatinem/rust-cache@master
        with:
          key: emulator-x86_64
      - uses: actions/setup-java@main
        with:
          distribution: temurin
          java-version: 17
      - uses: android-actions/setup-android@main
      - run: |
          cargo ndk -t x86_64 --manifest-path torvox-gui-android/Cargo.toml -o android/app/src/main/jniLibs build --profile dev
          NDK_DIR=$(find "$ANDROID_HOME/ndk" -maxdepth 1 -type d -name "[0-9]*" | sort -V | tail -1)
          export CARGO_TARGET_X86_64_LINUX_ANDROID_LINKER=$NDK_DIR/toolchains/llvm/prebuilt/linux-x86_64/bin/x86_64-linux-android33-clang
          cargo build -p torvox-exec --target x86_64-linux-android --profile dev
          mkdir -p android/app/src/main/assets/bin/x86_64
          cp target/x86_64-linux-android/debug/torvox-exec android/app/src/main/assets/bin/x86_64/
      - working-directory: android
        run: ./gradlew assembleDebug
      - uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 36
          target: default
          arch: x86_64
          profile: pixel_7_pro
          ram-size: 2048M
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: |
            adb install -r android/app/build/outputs/apk/debug/app-debug.apk
            adb shell am start -a android.intent.action.MAIN -n io.torvox/.MainActivity
            sleep 10
            adb shell am start -a android.intent.action.MAIN -n io.torvox/.MainActivity
            sleep 3
            adb exec-out screencap -p > /tmp/torvox-test.png
            adb shell pm list packages | grep -q io.torvox
