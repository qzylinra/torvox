name: CI
on:
  push:
    branches: [main]
jobs:
  rust-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@main
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@master
      - run: |
          cargo fmt --check
          cargo clippy --deny warnings --all-targets --all-features
      - uses: taiki-e/install-action@nextest
      - run: |
          cargo nextest run --workspace
          cargo test --workspace -- proptest
  android-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@main
      - uses: actions/setup-java@main
        with:
          distribution: temurin
          java-version: 25
      - uses: actions/setup-android-sdk@main
      - working-directory: android
        run: |
          ./gradlew lint --quiet
          ./gradlew test --quiet
  android-emulator-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@main
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - uses: actions/setup-java@main
        with:
          distribution: temurin
          java-version: 25
      - uses: actions/setup-android-sdk@main
      - name: Build APK
        working-directory: android
        run: ./gradlew assembleDebug
      - name: Android Emulator Test
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 36
          target: default
          arch: x86_64
          profile: pixel_7_pro
          ram-size: 2048M
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: |
            adb install -r android/app/build/outputs/apk/debug/app-debug.apk
            adb shell am start -a android.intent.action.MAIN -n io.torvox/.MainActivity
            sleep 5
            adb shell dumpsys activity activities | grep -q "io.torvox/.MainActivity"
