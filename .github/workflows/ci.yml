name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
jobs:
  rust-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@main
      - uses: cachix/install-nix-action@main
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
      - uses: ./.github/actions/setup-rust-deps
      - run: nix develop --command cargo fmt --check
      - run: nix develop --command cargo clippy --all-targets --all-features -- -D warnings
      - run: nix develop --command cargo nextest run --workspace
      - run: nix develop --command env QUICKCHECK_TESTS=10000 cargo test --workspace
      - run: nix develop --command cargo test --workspace -- proptest
  mutation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@main
      - uses: cachix/install-nix-action@main
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
      - uses: ./.github/actions/setup-rust-deps
      - run: nix develop --command cargo mutants --timeout 120
        continue-on-error: true
      - uses: actions/upload-artifact@main
        if: always()
        with:
          name: mutation-report
          path: target/mutation/
  no-std-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@main
      - uses: cachix/install-nix-action@main
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
      - uses: ./.github/actions/setup-rust-deps
      - run: nix develop --command cargo build -p torvox-core --target thumbv6m-none-eabi --no-default-features --features alloc
  android-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@main
      - uses: cachix/install-nix-action@main
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
      - uses: ./.github/actions/setup-rust-deps
      - run: |
          nix develop --command bash -c '
            cargo build -p torvox-core
            cargo build -p torvox-terminal
            cargo build -p torvox-core --target thumbv6m-none-eabi --no-default-features --features alloc
          '
      - uses: android-actions/setup-android@main
      - working-directory: android
        run: |
          nix develop --command ./gradlew lint --quiet
          nix develop --command ./gradlew test --quiet
          nix develop --command ./gradlew roborazziDebug --quiet || echo "Roborazzi tests may need golden images - see artifacts"
      - uses: actions/upload-artifact@main
        if: always()
        with:
          name: roborazzi-report
          path: android/app/build/reports/roborazzi/
  android-emulator-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@main
      - uses: cachix/install-nix-action@main
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
      - uses: ./.github/actions/setup-rust-deps
      - run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - uses: Swatinem/rust-cache@master
        with:
          key: emulator-x86_64
      - uses: android-actions/setup-android@main
      - run: |
          nix develop --command bash -c '
            cargo ndk -t x86_64 --manifest-path torvox-gui-android/Cargo.toml -o android/app/src/main/jniLibs -P 33 build --release
            NDK_DIR=$(find "$ANDROID_HOME/ndk" -maxdepth 1 -type d -name "[0-9]*" | sort -V | tail -1)
            export CARGO_TARGET_X86_64_LINUX_ANDROID_LINKER=$NDK_DIR/toolchains/llvm/prebuilt/linux-x86_64/bin/x86_64-linux-android33-clang
            cargo build -p torvox-exec --target x86_64-linux-android --release
            mkdir -p android/app/src/main/assets/bin/x86_64
            cp target/x86_64-linux-android/release/torvox-exec android/app/src/main/assets/bin/x86_64/
          '
      - working-directory: android
        run: nix develop --command ./gradlew assembleDebug
      - uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 36
          target: default
          arch: x86_64
          profile: pixel_7_pro
          ram-size: 2048M
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: |
            adb install -r android/app/build/outputs/apk/debug/app-debug.apk
            sleep 10
            adb shell am start -a android.intent.action.MAIN -n io.torvox/.MainActivity
            sleep 15
            adb shell am start -a android.intent.action.MAIN -n io.torvox/.MainActivity
            sleep 5
            adb exec-out screencap -p > /tmp/torvox-test.png
            adb shell pm list packages | grep io.torvox
            adb logcat -d -s TorvoxRust:I TorvoxRuntime:I 2>&1 | tail -30
            adb logcat -d 2>&1 | grep -q "Fatal signal" && exit 1 || true
      - uses: actions/upload-artifact@main
        if: always()
        with:
          name: emulator-screenshots
          path: /tmp/torvox-test.png
