name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
jobs:
  rust-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: |
          cargo fmt --check
          cargo clippy --all-targets --all-features -- -D warnings
      - uses: taiki-e/install-action@nextest
      - run: |
          cargo nextest run --workspace
          cargo test --workspace -- proptest
  no-std-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: thumbv6m-none-eabi
      - run: cargo build -p torvox-core --target thumbv6m-none-eabi --no-default-features --features alloc
  android-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: android-actions/setup-android@v3
      - working-directory: android
        run: |
          ./gradlew lint --quiet
          ./gradlew test --quiet
  android-emulator-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-linux-android
      - name: Install cargo-ndk
        run: cargo install cargo-ndk@4.1.2
      - uses: Swatinem/rust-cache@v2
        with:
          key: emulator-x86_64
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: android-actions/setup-android@v3
      - name: Build cdylib (x86_64 only for emulator)
        run: cargo ndk -t x86_64 --manifest-path torvox-gui-android/Cargo.toml -o android/app/src/main/jniLibs build --profile dev
      - name: Build torvox-exec (x86_64 for emulator)
        env:
          ANDROID_NDK_ROOT: /usr/local/lib/android/sdk/ndk/29.0.14206865
          CARGO_TARGET_X86_64_LINUX_ANDROID_LINKER: /usr/local/lib/android/sdk/ndk/29.0.14206865/toolchains/llvm/prebuilt/linux-x86_64/bin/x86_64-linux-android33-clang
        run: |
          cargo build -p torvox-exec --target x86_64-linux-android --profile dev
          mkdir -p android/app/src/main/assets/bin/x86_64
          cp target/x86_64-linux-android/debug/torvox-exec android/app/src/main/assets/bin/x86_64/
      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug
      - name: Android Emulator UI Test
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 36
          target: default
          arch: x86_64
          profile: pixel_7_pro
          ram-size: 2048M
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: |
            adb install -r android/app/build/outputs/apk/debug/app-debug.apk
            adb shell am start -a android.intent.action.MAIN -n io.torvox/.MainActivity
            sleep 5
            adb shell dumpsys activity activities | grep -q "io.torvox/.MainActivity"
            adb exec-out screencap -p > /tmp/torvox-test.png
            adb shell pm list packages | grep -q io.torvox
