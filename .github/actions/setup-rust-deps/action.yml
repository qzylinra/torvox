name: Setup Rust Dependencies
description: Clone libghostty-rs (zig comes from nix develop)
runs:
  using: composite
  steps:
    - shell: bash
      run: |
        if [ ! -d libghostty-rs ]; then
          git clone --depth 1 https://github.com/Uzaaft/libghostty-rs.git libghostty-rs
        fi
        cd libghostty-rs && git apply ../patches/libghostty-vt-android.patch
