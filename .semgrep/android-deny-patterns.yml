rules:
  - id: no-toast-hardcoded-text
    patterns:
      - pattern: |
          Toast.$METHOD($CONTEXT, $TEXT, $DURATION).show()
      - metavariable-pattern:
          metavariable: $TEXT
          pattern-regex: '"[^"]+"'
    message: "Toast with hardcoded text. Use a string resource (`R.string.*`) instead for localization."
    severity: WARNING
    languages: [kotlin, java]
    fix: |
      Toast.$METHOD($CONTEXT, R.string.$RESOURCE, $DURATION).show()

  - id: no-activity-static-leak
    patterns:
      - pattern-either:
          - pattern: |
              companion object {
                ...
                var $FIELD: $ACTIVITY = ...
                ...
              }
          - pattern: |
              object $OBJECT {
                ...
                var $FIELD: $ACTIVITY = ...
                ...
              }
      - metavariable-pattern:
          metavariable: $ACTIVITY
          pattern: Activity
    message: "Storing an Activity reference in a companion/object leaks the Activity. Use `WeakReference<Activity>` or a lifecycle-aware pattern."
    severity: ERROR
    languages: [kotlin]

  - id: no-basecontext-stored
    patterns:
      - pattern-either:
          - pattern: |
              companion object {
                ...
                var $FIELD = $CTX.getBaseContext()
                ...
              }
          - pattern: |
              object $OBJECT {
                ...
                var $FIELD = $CTX.getBaseContext()
                ...
              }
          - pattern: |
              companion object {
                ...
                var $FIELD = $CTX.baseContext
                ...
              }
          - pattern: |
              object $OBJECT {
                ...
                var $FIELD = $CTX.baseContext
                ...
              }
    message: "Storing `BaseContext` in a companion/object leaks the context. Use `ApplicationContext` with `WeakReference` or pass context explicitly."
    severity: ERROR
    languages: [kotlin]

  - id: no-thread-sleep-main
    patterns:
      - pattern: Thread.sleep($MILLIS)
    message: "`Thread.sleep()` blocks the current thread. If on the main thread, this causes ANRs. Use coroutines with `delay()` instead."
    severity: ERROR
    languages: [kotlin, java]
    fix: |
      delay($MILLIS)
