appId: com.termux
name: Selection copy and paste
tags:
  - e2e
  - p1
---
- launchApp:
    clearState: true
    stopApp: true
- waitForAnimationToEnd:
    timeout: 20000
- tapOn:
    text: "Wait"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
# Wait for bootstrap to fully complete
- extendedWaitUntil:
    visible:
      id: "ModifierBar"
    timeout: 60000
- assertVisible:
    id: "TerminalContent"
- waitForAnimationToEnd:
    timeout: 5000
# Type some text we can select
- tapOn:
    id: "TerminalContent"
- waitForAnimationToEnd:
    timeout: 3000
- inputText: "echo COPY_PASTE_TARGET"
- pressKey: Enter
- waitForAnimationToEnd:
    timeout: 3000
- hideKeyboard
- waitForAnimationToEnd:
    timeout: 1000
# Long press on terminal content to trigger selection mode
- longPressOn:
    id: "TerminalContent"
- waitForAnimationToEnd:
    timeout: 2000
- takeScreenshot: selection_copy_visible
# Tap Copy if visible
- tapOn:
    text: "Copy"
    optional: true
- waitForAnimationToEnd:
    timeout: 1000
# Tap on terminal to deselect
- tapOn:
    id: "TerminalContent"
    optional: true
- waitForAnimationToEnd:
    timeout: 1000
# Long press again for paste option
- longPressOn:
    id: "TerminalContent"
- waitForAnimationToEnd:
    timeout: 2000
- takeScreenshot: paste_available
# Tap Paste if visible
- tapOn:
    text: "Paste"
    optional: true
- waitForAnimationToEnd:
    timeout: 1000
- takeScreenshot: copy_paste_complete
