appId: com.termux
name: Paste clipboard text into terminal
tags:
  - e2e
  - p1
---
- launchApp:
    clearState: true
    stopApp: true
- waitForAnimationToEnd:
    timeout: 20000
- tapOn:
    text: "Wait"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- extendedWaitUntil:
    visible:
      id: "TerminalScreen"
    timeout: 30000
- assertVisible:
    id: "TerminalContent"
- waitForAnimationToEnd:
    timeout: 3000
# Place known text on the clipboard, then paste it into the terminal
- setClipboard: "PASTE_MARKER_TEXT"
- tapOn:
    id: "TerminalContent"
- waitForAnimationToEnd:
    timeout: 3000
- pasteText
- waitForAnimationToEnd:
    timeout: 2000
# Terminal output is a GPU canvas; verify the paste did not crash the terminal
# and that the surface is still interactive.
- takeScreenshot: paste_marker_text
- assertVisible:
    id: "ModifierBar"
- assertVisible:
    id: "TerminalContent"
