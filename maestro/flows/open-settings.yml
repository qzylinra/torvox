appId: com.termux
name: Open settings and navigate back
tags:
  - smoke
  - p1
---
- launchApp:
    clearState: true
    stopApp: true
- waitForAnimationToEnd:
    timeout: 20000
- tapOn:
    text: "Wait"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- extendedWaitUntil:
    visible:
      id: "TerminalScreen"
    timeout: 30000
- assertVisible:
    id: "TerminalScreen"
# Open drawer via swipe (full width to ensure drawer opens)
- swipe:
    start: 3%,50%
    end: 50%,50%
    duration: 500
- waitForAnimationToEnd:
    timeout: 3000
- tapOn:
    id: "SettingsButton"
- waitForAnimationToEnd:
    timeout: 5000
- assertVisible:
    id: "SettingsScreen"
- assertVisible:
    text: "Appearance"
- scrollUntilVisible:
    element:
      text: "Font Size"
    direction: DOWN
- assertVisible:
    text: "Font Size"
- scrollUntilVisible:
    element:
      text: "Terminal Theme"
    direction: DOWN
- assertVisible:
    text: "Terminal Theme"
- scrollUntilVisible:
    element:
      text: "Terminal"
    direction: DOWN
- assertVisible:
    text: "Terminal"
- tapOn:
    id: "SettingsBackButton"
- waitForAnimationToEnd:
    timeout: 3000
- assertVisible:
    id: "TerminalScreen"
- takeScreenshot: settings_roundtrip
