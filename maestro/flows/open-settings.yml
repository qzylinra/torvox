appId: io.torvox
name: Open settings and navigate back
tags:
  - smoke
  - p1
---
- launchApp:
    clearState: true
    stopApp: true
- waitForAnimationToEnd:
    timeout: 20000
- tapOn:
    text: "Wait"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- assertVisible:
    id: "TerminalScreen"
- tapOn:
    id: "Key_☰"
- waitForAnimationToEnd
- tapOn:
    id: "SettingsButton"
- waitForAnimationToEnd
- assertVisible:
    id: "SettingsScreen"
- assertVisible:
    text: "Appearance"
- scrollUntilVisible:
    element:
      text: "Font Size"
    direction: DOWN
- assertVisible:
    text: "Font Size"
- scrollUntilVisible:
    element:
      text: "Theme"
    direction: DOWN
- assertVisible:
    text: "Theme"
- scrollUntilVisible:
    element:
      text: "Terminal"
    direction: DOWN
- assertVisible:
    text: "Terminal"
- tapOn:
    id: "SettingsBackButton"
- waitForAnimationToEnd
- assertVisible:
    id: "TerminalScreen"
- takeScreenshot: settings_roundtrip
