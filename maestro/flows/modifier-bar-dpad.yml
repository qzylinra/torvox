appId: io.torvox
name: Modifier bar D-pad layout verification
tags:
  - smoke
  - p0
---
- launchApp:
    clearState: true
    stopApp: true
- waitForAnimationToEnd:
    timeout: 20000
- tapOn:
    text: "Wait"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- assertVisible:
    id: "ModifierBar"
# Verify all row1 keys are visible
- assertVisible:
    id: "Key_ESC"
- assertVisible:
    id: "Key_TAB"
- assertVisible:
    id: "Key_/"
- assertVisible:
    id: "Key_-"
- assertVisible:
    id: "Key_CTRL"
- assertVisible:
    id: "Key_ALT"
# Verify D-pad arrow keys
- assertVisible:
    id: "Key_←"
- assertVisible:
    id: "Key_↑"
- assertVisible:
    id: "Key_↓"
- assertVisible:
    id: "Key_→"
# Verify row2 keys
- assertVisible:
    id: "Key_☰"
- assertVisible:
    id: "Key_~"
- assertVisible:
    id: "Key_ENT"
# Interact with arrow keys
- tapOn:
    id: "Key_↑"
- waitForAnimationToEnd:
    timeout: 500
- tapOn:
    id: "Key_↓"
- waitForAnimationToEnd:
    timeout: 500
- tapOn:
    id: "Key_←"
- waitForAnimationToEnd:
    timeout: 500
- tapOn:
    id: "Key_→"
- waitForAnimationToEnd:
    timeout: 500
# Take screenshot to verify layout
- takeScreenshot: modifier_bar_dpad
