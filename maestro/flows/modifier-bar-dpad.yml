appId: com.termux
name: Modifier bar D-pad layout verification
tags:
  - smoke
  - p0
---
- launchApp:
    clearState: true
    stopApp: true
- waitForAnimationToEnd:
    timeout: 20000
- tapOn:
    text: "Wait"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- extendedWaitUntil:
    visible:
      id: "TerminalScreen"
    timeout: 30000
- assertVisible:
    id: "ModifierBar"
- assertVisible:
    id: "TerminalContent"
# Verify row1 keys
- assertVisible:
    id: "Key_ESC"
- assertVisible:
    id: "Key_HOME"
- assertVisible:
    id: "Key_↑"
- assertVisible:
    id: "Key_END"
- assertVisible:
    id: "Key_PGUP"
# Verify row2 keys
- assertVisible:
    id: "Key_TAB"
- assertVisible:
    id: "Key_CTRL"
- assertVisible:
    id: "Key_ALT"
- assertVisible:
    id: "Key_←"
- assertVisible:
    id: "Key_↓"
- assertVisible:
    id: "Key_→"
- assertVisible:
    id: "Key_PGDN"
# Interact with arrow keys
- tapOn:
    id: "Key_↑"
- waitForAnimationToEnd:
    timeout: 500
- tapOn:
    id: "Key_↓"
- waitForAnimationToEnd:
    timeout: 500
- tapOn:
    id: "Key_←"
- waitForAnimationToEnd:
    timeout: 500
- tapOn:
    id: "Key_→"
- waitForAnimationToEnd:
    timeout: 500
# Take screenshot to verify layout
- takeScreenshot: modifier_bar_dpad
