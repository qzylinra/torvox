appId: com.termux
name: Session management verification
tags:
  - e2e
  - p1
---
- launchApp:
    clearState: true
    stopApp: true
- waitForAnimationToEnd:
    timeout: 20000
- tapOn:
    text: "Wait"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- extendedWaitUntil:
    visible:
      id: "TerminalScreen"
    timeout: 30000
- assertVisible:
    id: "TerminalScreen"
- assertVisible:
    id: "ModifierBar"
# Open session drawer via swipe
- swipe:
    start: 3%,50%
    end: 50%,50%
    duration: 500
- waitForAnimationToEnd:
    timeout: 3000
- assertVisible:
    id: "SessionDrawer"
- assertVisible:
    id: "AddSessionButton"
- takeScreenshot: session_drawer_default
# Close drawer by tapping outside
- tapOn:
    point: 70%,50%
- waitForAnimationToEnd:
    timeout: 2000
- assertVisible:
    id: "TerminalScreen"
- takeScreenshot: session_drawer_closed
