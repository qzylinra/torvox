appId: com.termux
name: Long-press selection and copy
tags:
  - e2e
  - p1
---
- launchApp:
    clearState: true
    stopApp: true
- waitForAnimationToEnd:
    timeout: 20000
- tapOn:
    text: "Wait"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- extendedWaitUntil:
    visible:
      id: "ModifierBar"
    timeout: 60000
- assertVisible:
    id: "TerminalContent"
- waitForAnimationToEnd:
    timeout: 3000
# Put selectable text on screen
- tapOn:
    id: "TerminalContent"
- waitForAnimationToEnd:
    timeout: 3000
- inputText: "echo SELECTION_TARGET"
- pressKey: Enter
- waitForAnimationToEnd:
    timeout: 3000
- hideKeyboard
- waitForAnimationToEnd:
    timeout: 1000
# Long-press to enter selection mode
- longPressOn:
    id: "TerminalContent"
- waitForAnimationToEnd:
    timeout: 2000
- takeScreenshot: selection_active
# Trigger copy (selection handle / context action)
- tapOn:
    text: "Copy"
    optional: true
- waitForAnimationToEnd:
    timeout: 1000
# A "Copied" toast or similar confirmation may appear; assert if present
- assertVisible:
    text: "Copied"
    optional: true
- takeScreenshot: selection_copied
# Deselect and confirm the terminal is still interactive
- tapOn:
    id: "TerminalContent"
    optional: true
- waitForAnimationToEnd:
    timeout: 1000
- assertVisible:
    id: "ModifierBar"
- assertVisible:
    id: "TerminalContent"
