appId: com.termux
name: Terminal survives config change
tags:
  - e2e
  - p2
---
- launchApp:
    clearState: true
    stopApp: true
- waitForAnimationToEnd:
    timeout: 20000
- tapOn:
    text: "Wait"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- extendedWaitUntil:
    visible:
      id: "ModifierBar"
    timeout: 60000
- assertVisible:
    id: "TerminalContent"
- waitForAnimationToEnd:
    timeout: 3000
# Type something to verify initial state
- tapOn:
    id: "TerminalContent"
- waitForAnimationToEnd:
    timeout: 3000
- inputText: "echo RESIZE_TEST"
- pressKey: Enter
- waitForAnimationToEnd:
    timeout: 2000
- takeScreenshot: resize_before
# Press back button and return (simulates config change survival)
- pressKey: Back
- waitForAnimationToEnd:
    timeout: 3000
# Terminal should still be visible
- assertVisible:
    id: "ModifierBar"
- assertVisible:
    id: "TerminalContent"
- takeScreenshot: resize_survives
# Verify terminal is still functional after return
- tapOn:
    id: "TerminalContent"
- waitForAnimationToEnd:
    timeout: 3000
- inputText: "echo RESIZE_RESTORED"
- pressKey: Enter
- waitForAnimationToEnd:
    timeout: 2000
- takeScreenshot: resize_restore_verified
