appId: com.termux
name: Font change triggers terminal re-render
tags:
  - e2e
  - p1
---
- launchApp:
    clearState: true
    stopApp: true
- waitForAnimationToEnd:
    timeout: 20000
- tapOn:
    text: "Wait"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- extendedWaitUntil:
    visible:
      id: "TerminalScreen"
    timeout: 30000
- assertVisible:
    id: "ModifierBar"
# Open drawer → Settings
- tapOn:
    id: "Key_DRAWER"
- waitForAnimationToEnd:
    timeout: 3000
- assertVisible:
    id: "SettingsButton"
- tapOn:
    id: "SettingsButton"
- waitForAnimationToEnd:
    timeout: 5000
- assertVisible:
    id: "SettingsScreen"
- takeScreenshot: settings_open_for_font
# Scroll to Font Family section
- scrollUntilVisible:
    element:
      text: "Font Family"
    direction: DOWN
- assertVisible:
    text: "Font Family"
# Tap Change to open font picker dialog
- tapOn:
    text: "Change"
- waitForAnimationToEnd:
    timeout: 3000
# Assert the font picker dialog appeared
- assertVisible:
    text: "Select Font Family"
- takeScreenshot: font_picker_dialog
# Select a different font
- tapOn:
    text: "System Default"
- waitForAnimationToEnd:
    timeout: 2000
# Go back to terminal
- tapOn:
    id: "SettingsBackButton"
- waitForAnimationToEnd:
    timeout: 3000
- assertVisible:
    id: "ModifierBar"
- assertVisible:
    id: "TerminalContent"
# Type a command to verify terminal re-renders with new font
- tapOn:
    id: "TerminalContent"
- waitForAnimationToEnd:
    timeout: 3000
- inputText: "echo FONT_TEST"
- pressKey: Enter
- waitForAnimationToEnd:
    timeout: 2000
- takeScreenshot: font_change_rerender_verified
