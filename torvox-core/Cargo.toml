[package]
name = "torvox-core"
version = "0.1.0"
edition = "2024"
description = "Core types for Torvox terminal emulator (no_std compatible)"
license = "UNLICENSED"

[dependencies]
serde = { workspace = true }
postcard = { workspace = true }
thiserror = { workspace = true, optional = true }

[features]
default = ["std", "alloc"]
std = ["thiserror", "serde/std", "postcard/use-std"]
alloc = ["serde/alloc", "postcard/alloc"]
