# @REQ_SYS_005 — Cross-crate architecture enforcement
rules:
  - id: no-torvox-terminal-in-core
    patterns:
      - pattern: torvox_terminal
      - pattern-not: torvox_terminal_config
    paths:
      include:
        - "torvox-core/src/**/*.rs"
    message: "torvox-core must not depend on torvox-terminal (violates crate direction)"
    severity: ERROR
    languages:
      - rust

  - id: no-torvox-renderer-in-core
    pattern: torvox_renderer
    paths:
      include:
        - "torvox-core/src/**/*.rs"
    message: "torvox-core must not depend on torvox-renderer (violates crate direction)"
    severity: ERROR
    languages:
      - rust

  - id: no-torvox-gui-android-in-core
    pattern: torvox_gui_android
    paths:
      include:
        - "torvox-core/src/**/*.rs"
    message: "torvox-core must not depend on torvox-gui-android (violates crate direction)"
    severity: ERROR
    languages:
      - rust

  - id: no-torvox-renderer-in-terminal
    pattern: torvox_renderer
    paths:
      include:
        - "torvox-terminal/src/**/*.rs"
    message: "torvox-terminal must not depend on torvox-renderer (violates crate direction)"
    severity: ERROR
    languages:
      - rust

  - id: no-torvox-gui-android-in-terminal
    pattern: torvox_gui_android
    paths:
      include:
        - "torvox-terminal/src/**/*.rs"
    message: "torvox-terminal must not depend on torvox-gui-android (violates crate direction)"
    severity: ERROR
    languages:
      - rust

  - id: no-torvox-gui-android-in-renderer
    pattern: torvox_gui_android
    paths:
      include:
        - "torvox-renderer/src/**/*.rs"
    message: "torvox-renderer must not depend on torvox-gui-android (violates crate direction)"
    severity: ERROR
    languages:
      - rust

  # @REQ_CORE_008 — no_std compatibility
  - id: no-std-import-in-core
    patterns:
      - pattern-regex: 'use std::'
      - pattern-not-inside: '#\[cfg\(test\)\]'
    paths:
      include:
        - "torvox-core/src/**/*.rs"
    message: "torvox-core is #![no_std] — use core:: or alloc:: instead of std::"
    severity: ERROR
    languages:
      - rust

  - id: no-anyhow-in-libraries
    pattern-regex: 'use anyhow::'
    paths:
      include:
        - "torvox-core/src/**/*.rs"
        - "torvox-terminal/src/**/*.rs"
        - "torvox-renderer/src/**/*.rs"
        - "torvox-gui-android/src/**/*.rs"
    message: "anyhow is forbidden in library crates — use thiserror 2"
    severity: ERROR
    languages:
      - rust

  # @REQ_ANDR_014 — DocumentsProvider root via filesDir not hardcoded
  - id: no-hardcoded-paths
    pattern-regex: '/data/[a-zA-Z0-9._]+/files'
    paths:
      include:
        - "android/app/src/main/**/*.kt"
    message: "No hardcoded /data/.*/files paths in production code — use context.filesDir"
    severity: ERROR
    languages:
      - kotlin

  - id: no-exec-in-libraries
    pattern-regex: torvox_exec
    paths:
      include:
        - "torvox-core/src/**/*.rs"
        - "torvox-terminal/src/**/*.rs"
        - "torvox-renderer/src/**/*.rs"
        - "torvox-gui-android/src/**/*.rs"
    message: "torvox-exec must not be a dependency of library crates"
    severity: ERROR
    languages:
      - rust

  - id: no-allow-in-prod
    patterns:
      - pattern-regex: '#\[allow\('
      - pattern-not-inside: '#[cfg(test)]'
    paths:
      include:
        - "torvox-core/src/**/*.rs"
        - "torvox-terminal/src/**/*.rs"
        - "torvox-renderer/src/**/*.rs"
        - "torvox-gui-android/src/**/*.rs"
      exclude:
        - "**/test_helpers*"
    message: "No #[allow] in production source code — fix the underlying issue instead"
    severity: ERROR
    languages:
      - rust
