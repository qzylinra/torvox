# Mutation testing configuration
# Run: nix develop --command "cargo mutants --package <crate>"
# CI:  nix develop --command "nu scripts/check-rust.nu"

timeout = 60  # seconds per mutation (nextest runs <10s per crate)
test_tool = "nextest"
threshold = 0.60

examine_globs = [
  "terminal-core/src/**/*.rs",
  "terminal-engine/src/**/*.rs",
  "gpu-renderer/src/**/*.rs",
  "mcp-server/src/**/*.rs",
]

# Files excluded from mutation testing:
# - tests/ benches/ examples/ fuzz/: not production code
# - build.rs: simple metadata, no logic
# - pty.rs: contains unsafe fork() — mutations could create fork bombs
# - shader/** : WGSL shader source, not Rust code
# - grid.rs, selection.rs: excluded from --mutants (quick) for speed;
#   run `nix develop --command "cargo mutants --package terminal-core --include grid.rs selection.rs"`
#   for deep coverage
exclude_globs = [
  "**/target/**",
  "**/tests/**",
  "**/benches/**",
  "**/examples/**",
  "**/fuzz/**",
  "**/test_data/**",
  "**/build.rs",
  "terminal-core/src/grid.rs",
  "terminal-core/src/selection.rs",
  "terminal-engine/src/pty.rs",
  "gpu-renderer/src/shader/**",
]
