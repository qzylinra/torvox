"$schema" = "https://ubcode.useblocks.com/ubproject.schema.json"

[project]
name = "torvox"
srcdir = "."

[needs]
build_json = true
id_required = true
id_regex = "^(REQ|SPEC|IMPL|TEST|FEAT|EXC)_[A-Z0-9_]+$"

# ── Need Types ──

[[needs.types]]
directive = "req"
title = "Requirement"
prefix = "REQ_"

[[needs.types]]
directive = "spec"
title = "Design Specification"
prefix = "SPEC_"

[[needs.types]]
directive = "impl"
title = "Implementation"
prefix = "IMPL_"

[[needs.types]]
directive = "test"
title = "Test Case"
prefix = "TEST_"

[[needs.types]]
directive = "feat"
title = "Feature"
prefix = "FEAT_"

# ── Link Types ──

[[needs.extra_links]]
option = "satisfies"
outgoing = "satisfies"
incoming = "satisfied by"

[[needs.extra_links]]
option = "verifies"
outgoing = "verifies"
incoming = "verified by"

[[needs.extra_links]]
option = "implements"
outgoing = "implements"
incoming = "implemented by"

[[needs.extra_links]]
option = "refines"
outgoing = "refines"
incoming = "refined by"

# ── ISO 29148 Structured Fields ──

[[needs.extra_options]]
option = "rationale"
type = "string"

[[needs.extra_options]]
option = "acceptance"
type = "string"

[[needs.extra_links]]
option = "exception_ids"
outgoing = "exception_ids"
incoming = "has_exception"

# ── CodeLinks: torvox-core (Rust) ──
[codelinks.projects.torvox_core]
remote_url_pattern = "https://github.com/user/torvox/blob/{commit}/{path}#L{line}"

[codelinks.projects.torvox_core.source_discover]
src_dir = "torvox-core/src"
include = ["**/*.rs"]
comment_type = "rust"

[codelinks.projects.torvox_core.analyse]
get_oneline_needs = true
get_need_id_refs = true

[codelinks.projects.torvox_core.analyse.oneline_comment_style]
start_sequence = "@"
field_split_char = ","
needs_fields = [
  { name = "title", type = "str" },
  { name = "id", type = "str" },
  { name = "type", type = "str", default = "impl" },
  { name = "links", type = "list[str]", default = [
  ] },
]

[codelinks.projects.torvox_core.analyse.need_id_refs]
markers = ["@need-ids:"]

