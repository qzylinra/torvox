# Suppressions Registry — ISO 29148 compliance exceptions
#
# Schema:
#
# [suppression.ID]
# description = "Short description of what is suppressed"
# rationale = "Why this suppression is acceptable (not an excuse)"
# affected_requirements = ["REQ_XXXX_XXX", ...]
# condition = "When/how the exception manifests"
# expires = null       # null = permanent; "2026-09-01" = ISO date to review
#
# Rules:
# - Only document REAL exceptions — no "N/A" boilerplate entries
# - Every entry must have a genuine rationale (performance tradeoff,
#   platform constraint, architecture decision)
# - Temporary entries MUST have an expires date <= 90 days
# - Permanent entries omit expires (or set to empty)

[suppression.EXC_ANDR_008]
description = "Font switch may silently fail to load a broken font file"
rationale = """
File I/O errors cannot be prevented at the type level on Android; runtime
validation is the practical approach. The try-catch design (REQ_ANDR_008)
already preserves the previous working font on failure.
"""
affected_requirements = ["REQ_ANDR_008"]
condition = "Font file is corrupted or has an unsupported format"

[suppression.EXC_CORE_002]
description = "GridSnapshot may return stale data during concurrent push_line"
rationale = """
MPMC channel semantics guarantee eventual consistency; strict
linearizability would require a mutex that conflicts with REQ_TERM_006
(lock-free thread architecture).
"""
affected_requirements = ["REQ_CORE_002"]
condition = "Snapshot taken while push_line is concurrently writing"

[suppression.EXC_TERM_001]
description = "PtyPair::fork() contains the only allowed unsafe code in the workspace"
rationale = """
The fork() syscall is inherently unsafe in Rust; this is the sole
exception and is contained in a single abstraction (PtyPair trait) that is
reviewed on every change.
"""
affected_requirements = ["REQ_TERM_001"]
condition = "During process spawning via fork()"

[suppression.EXC_CORE_008]
description = "no_std constraints prevent use of std::collections and std::sync"
rationale = """
torvox-core targets embedded/FFI contexts; alloc-based alternatives (Vec,
BTreeMap) are used instead. The core library avoids std entirely except
behind #[cfg(feature = "std")] gates.
"""
affected_requirements = ["REQ_CORE_008"]
condition = "Compilation in no_std mode"

[suppression.EXC_REND_005]
description = "Render thread exits permanently after 300 consecutive GPU errors"
rationale = """
The 300-error limit (~30s) prevents infinite retry loops on unrecoverable
GPU errors; a new surface must be created to restart.
"""
affected_requirements = ["REQ_REND_005"]
condition = "After 300 consecutive GPU pipeline errors"
