# Pharaoh workflow configuration for torvox
# Mode: reverse-eng (codebase exists, sphinx-needs being created now)
# Generated: 2026-06-23

[pharaoh]
strictness = "enforcing"
mode = "reverse-eng"

[pharaoh.id_scheme]
# Observed from RST tree: REQ_CORE_001, IMPL_TERM_002, etc.
pattern = "{TYPE}_{MODULE}_{NUMBER}"
auto_increment = true

[pharaoh.workflow]
mode = "reverse-eng"
require_change_analysis = true
require_verification = true
require_mece_on_release = false

[pharaoh.traceability]
# Source 1 (needs.json inference): pending first ubc build
# Source 3 (no existing links): use strict forward direction
required_links = ["spec -> req", "impl -> spec", "test -> impl"]

[pharaoh.structured_fields]
rationale = "required"
acceptance = "required"
exception_ids = "optional"

[pharaoh.codelinks]
enabled = true
