# docs/traceability.yml
# Torvox Requirements Traceability Matrix
# Links: requirement → design → API → test
#
# Generated from:
#   - docs/srs.md          (requirements)
#   - docs/architecture.md (design decisions, module architecture)
#   - codebase test files  (test coverage)
#
# Verification commands use `cargo test --workspace` for the full suite
# or `cargo test --package <crate>` for crate-specific verification.

version: 1.1
last_updated: 2026-07-12

requirements:

  # ==========================================================================
  # 3.1 Terminal Emulation (FR-001 — FR-009)
  # ==========================================================================

  FR-001:
    description: "The system SHALL process VT/xterm escape sequences using the Ghostty parser (libghostty-vt)."
    design:
      - "docs/architecture.md#2.3-torvox-terminal"
      - "docs/architecture.md#5.2-ghostty-vt-parser"
    api: []
    tests:
      - "torvox-terminal/tests/xterm_conformance.rs"
      - "torvox-terminal/tests/vttest_sequences.rs"
      - "torvox-terminal/tests/ecma48_correctness.rs"
      - "torvox-terminal/tests/esctest_suite.rs"
      - "torvox-terminal/tests/esctest_full.rs"
      - "torvox-terminal/tests/vt_coverage_check.rs"
      - "torvox-terminal/tests/fuzz_vt_structured.rs"
      - "torvox-terminal/tests/vttest_ref_files.rs"
      - "fuzz/fuzz_targets/fuzz_vt_parser.rs"
    verification: "cargo test --package torvox-terminal"

  FR-002:
    description: "The system SHALL maintain a terminal grid data model (Grid) consisting of rows of cells, each with a character code, foreground/background color, and text attributes (Attrs)."
    design:
      - "docs/architecture.md#2.2-torvox-core"
    api: []
    tests:
      - "torvox-core/tests/grid_ops.rs"
      - "torvox-core/tests/grid_snapshot_integration.rs"
      - "torvox-core/tests/property_tests.rs"
      - "torvox-terminal/tests/grid_ops.rs"
      - "torvox-terminal/tests/grid_state_machine.rs"
      - "torvox-terminal/tests/ported_alacritty_ref/grid_ops.rs"
      - "torvox-terminal/tests/ported_alacritty_ref.rs"
    verification: "cargo test --package torvox-core && cargo test --package torvox-terminal"

  FR-003:
    description: "The system SHALL support SGR (Select Graphic Rendition) parameters: bold, dim, italic, underline, double underline, blink, reverse, hidden, strikethrough, overline, and protected."
    design:
      - "docs/architecture.md#2.2-torvox-core"
      - "torvox-core/src/sgr.rs"
    api: []
    tests:
      - "torvox-terminal/tests/sgr_parser_tests.rs"
      - "torvox-terminal/tests/sgr_proptest.rs"
      - "torvox-terminal/tests/sgr_full_compat.rs"
      - "torvox-terminal/tests/ported_kitty_full/sgr_attributes.rs"
      - "fuzz/fuzz_targets/fuzz_attrs.rs"
    verification: "cargo test --package torvox-terminal"

  FR-004:
    description: "The system SHALL support 16 ANSI color palette indices plus 256-color and truecolor (24-bit RGB) foreground/background specifications."
    design:
      - "docs/architecture.md#2.2-torvox-core"
      - "torvox-core/src/cell.rs"
    api: []
    tests:
      - "torvox-core/tests/terminal_colors.rs"
      - "torvox-terminal/tests/ported_kitty_full/colors.rs"
    verification: "cargo test --package torvox-core && cargo test --package torvox-terminal"

  FR-005:
    description: "The system SHALL support alternate screen buffer mode (SM/RM 1049) for full-screen applications (e.g., vim, less)."
    design:
      - "docs/architecture.md#2.2-torvox-core"
      - "torvox-core/src/grid.rs"
    api: []
    tests:
      - "torvox-terminal/tests/alt_screen.rs"
    verification: "cargo test --package torvox-terminal"

  FR-006:
    description: "The system SHALL support cursor positioning and movement (CUU, CUD, CUF, CUB, CUP, HVP, etc.) and cursor style (block, bar, underline, beam) with visible/hidden state."
    design:
      - "docs/architecture.md#2.2-torvox-core"
      - "torvox-core/src/cursor.rs"
      - "torvox-core/src/csi.rs"
    api: []
    tests:
      - "torvox-terminal/tests/cursor_cmds_tests.rs"
      - "torvox-terminal/tests/proptest_csi.rs"
      - "torvox-terminal/tests/ported_kitty_full/cursor_movement.rs"
      - "torvox-terminal/tests/dec_modes_dedicated.rs"
    verification: "cargo test --package torvox-terminal"

  FR-007:
    description: "The system SHALL support scrolling regions (scroll_up, scroll_down, insert_lines, delete_lines) with configurable top/bottom boundaries."
    design:
      - "docs/architecture.md#2.2-torvox-core"
      - "torvox-core/src/grid.rs"
    api: []
    tests:
      - "torvox-core/tests/grid_ops.rs"
      - "torvox-terminal/tests/grid_state_machine.rs"
      - "torvox-terminal/tests/ported_kitty_full/erase_operations.rs"
      - "fuzz/fuzz_targets/fuzz_grid_ops.rs"
      - "fuzz/fuzz_targets/fuzz_grid_resize.rs"
    verification: "cargo test --package torvox-core && cargo test --package torvox-terminal"

  FR-008:
    description: "The system SHALL support tab stops (set, clear, move)."
    design:
      - "docs/architecture.md#2.2-torvox-core"
      - "torvox-core/src/control.rs"
    api: []
    tests:
      - "torvox-terminal/tests/ported_kitty_full/tabs.rs"
    verification: "cargo test --package torvox-terminal"

  FR-009:
    description: "The system SHALL report terminal size changes via SIGWINCH to the child process."
    design:
      - "docs/architecture.md#2.3-torvox-terminal"
      - "docs/architecture.md#5.6-6-7-thread-model-per-session"
      - "torvox-terminal/src/session.rs"
    api: []
    tests:
      - "torvox-terminal/tests/lifecycle_test.rs"
      - "torvox-terminal/tests/session_state_machine.rs"
    verification: "cargo test --package torvox-terminal"

  # ==========================================================================
  # 3.2 Rendering Pipeline (FR-010 — FR-019)
  # ==========================================================================

  FR-010:
    description: "The system SHALL render the terminal grid using wgpu (Vulkan) as the sole graphics backend. OpenGL and CPU software paths are not supported."
    design:
      - "docs/architecture.md#2.4-torvox-renderer"
      - "docs/architecture.md#5.1-gpu-only-with-wgpu-vulkan"
    api: []
    tests:
      - "torvox-renderer/tests/gpu_headless_test.rs"
      - "torvox-renderer/tests/text_ocr_test.rs"
      - "torvox-gui-android/tests/gpu_noop_tests.rs"
      - "torvox-gui-android/tests/gpu_benchmark.rs"
      - "torvox-integration-tests/tests/terminal_render_test.rs"
    verification: "cargo test --package torvox-renderer"

  FR-011:
    description: "The system SHALL shape text runs using cosmic-text and rasterize glyphs using swash, caching results in a GPU atlas."
    design:
      - "docs/architecture.md#2.4-torvox-renderer"
      - "torvox-renderer/src/font.rs"
    api: []
    tests:
      - "torvox-renderer/tests/font_metrics.rs"
      - "torvox-renderer/tests/text_ocr_test.rs"
    verification: "cargo test --package torvox-renderer"

  FR-012:
    description: "The system SHALL pack glyph bitmaps into a GPU texture atlas using guillotiere for dynamic rectangle allocation and eviction."
    design:
      - "docs/architecture.md#2.4-torvox-renderer"
      - "torvox-renderer/src/font.rs"
      - "torvox-renderer/src/gpu.rs"
    api: []
    tests:
      - "torvox-renderer/tests/gpu_headless_test.rs"
    verification: "cargo test --package torvox-renderer"

  FR-013:
    description: "The system SHALL maintain a dirty mask (DirtyMask) that tracks which rows of the grid have changed and limit rendering to those rows."
    design:
      - "docs/architecture.md#2.2-torvox-core"
      - "torvox-core/src/cell.rs"
    api: []
    tests:
      - "torvox-core/tests/property_tests.rs"
      - "torvox-core/tests/grid_ops.rs"
    verification: "cargo test --package torvox-core"

  FR-014:
    description: "The system SHALL render a cell cursor (block, bar, underline, beam) with configurable color and blink behavior."
    design:
      - "docs/architecture.md#2.4-torvox-renderer"
      - "torvox-renderer/src/gpu.rs"
    api: []
    tests:
      - "torvox-renderer/tests/gpu_headless_test.rs"
    verification: "cargo test --package torvox-renderer"

  FR-015:
    description: "The system SHALL render text selection highlights (character, word, line, block modes) as colored overlays on the affected cells."
    design:
      - "docs/architecture.md#2.4-torvox-renderer"
      - "torvox-renderer/src/gpu.rs"
      - "torvox-core/src/selection.rs"
    api: []
    tests:
      - "torvox-renderer/tests/gpu_headless_test.rs"
    verification: "cargo test --package torvox-renderer"

  FR-016:
    description: "The system SHALL support font configuration: family, size, line spacing, and fallback to preferred monospace fonts (Roboto Mono, JetBrains Mono, etc.)."
    design:
      - "docs/architecture.md#2.4-torvox-renderer"
      - "torvox-core/src/config.rs"
      - "torvox-renderer/src/font.rs"
    api: []
    tests:
      - "torvox-renderer/tests/font_metrics.rs"
      - "torvox-terminal/tests/font_test.rs"
    verification: "cargo test --package torvox-renderer && cargo test --package torvox-terminal"

  FR-017:
    description: "The system SHALL render the terminal background, foreground, and 16-color ANSI palette from the active theme configuration."
    design:
      - "docs/architecture.md#2.4-torvox-renderer"
      - "torvox-renderer/src/gpu.rs"
      - "torvox-core/src/config.rs"
    api: []
    tests:
      - "torvox-renderer/tests/gpu_headless_test.rs"
      - "torvox-core/tests/terminal_colors.rs"
    verification: "cargo test --package torvox-renderer && cargo test --package torvox-core"

  FR-018:
    description: "The system SHALL recover from GPU surface destruction (e.g., Android activity restart) by recreating the render pipeline and continuing without data loss."
    design:
      - "docs/architecture.md#2.5-torvox-gui-android"
      - "docs/architecture.md#5.8-textureview-over-surfaceview"
      - "torvox-renderer/src/gpu.rs"
      - "torvox-gui-android/src/surface.rs"
    api: []
    tests:
      - "torvox-gui-android/tests/gpu_noop_tests.rs"
    verification: "cargo test --package torvox-gui-android"

  FR-019:
    description: "The system SHALL support the Kitty Graphics Protocol (KGP) for rendering inline images as textured quads."
    design:
      - "docs/architecture.md#2.4-torvox-renderer"
      - "torvox-renderer/src/gpu.rs"
    api: []
    tests: []
    verification: "cargo test --package torvox-renderer"

  # ==========================================================================
  # 3.3 Input Handling (FR-020 — FR-025)
  # ==========================================================================

  FR-020:
    description: "The system SHALL encode physical keyboard input using the Kitty Keyboard Protocol (KBP) for extended modifier and key reporting."
    design:
      - "docs/architecture.md#2.3-torvox-terminal"
      - "torvox-terminal/src/ghostty_terminal.rs"
      - "docs/architecture.md#3.2-input-path"
    api: []
    tests:
      - "torvox-terminal/tests/session_roundtrip.rs"
    verification: "cargo test --package torvox-terminal"

  FR-021:
    description: "The system SHALL support IME (Input Method Editor) text input for composing CJK and other complex characters, with Composing state management."
    design:
      - "docs/architecture.md#2.2-torvox-core"
      - "torvox-core/src/terminal.rs"
    api: []
    tests:
      - "torvox-core/tests/grapheme.rs"
      - "torvox-core/tests/unicode_icu_conformance.rs"
    verification: "cargo test --package torvox-core"

  FR-022:
    description: "The system SHALL support terminal selection in four modes: character (Char), word (Word), line (Line), and block (Block)."
    design:
      - "docs/architecture.md#2.2-torvox-core"
      - "torvox-core/src/selection.rs"
    api: []
    tests:
      - "torvox-core/tests/selection_text.rs"
      - "torvox-core/tests/selection_integration.rs"
      - "torvox-terminal/tests/selection_categories.rs"
      - "torvox-terminal/tests/selection_roundtrip.rs"
      - "fuzz/fuzz_targets/fuzz_selection.rs"
    verification: "cargo test --package torvox-core && cargo test --package torvox-terminal"

  FR-023:
    description: "The system SHALL automatically expand word-mode selections to word boundaries and detect URLs (http://, https://, ftp://, www.) for URL-aware selection expansion."
    design:
      - "docs/architecture.md#2.2-torvox-core"
      - "torvox-core/src/selection.rs"
    api: []
    tests:
      - "torvox-core/tests/selection_text.rs"
      - "torvox-core/tests/selection_integration.rs"
    verification: "cargo test --package torvox-core"

  FR-024:
    description: "The system SHALL support touch input gestures: tap to place cursor, long-press for selection handles, and swipe for scrollback navigation."
    design:
      - "docs/architecture.md#2.5-torvox-gui-android"
      - "torvox-gui-android/src/surface.rs"
    api: []
    tests:
      - "android/app/src/test/java/io/torvox/ui/TouchGestureTest.kt"
      - "android/app/src/test/java/io/torvox/ui/GestureInteractionTest.kt"
    verification: "cd android && ./gradlew testDebugUnitTest"

  FR-025:
    description: "The system SHALL support configurable backspace mode (DEL 0x7f or BS 0x08) and right-Alt mode (character modifier or meta)."
    design:
      - "docs/architecture.md#2.2-torvox-core"
      - "torvox-core/src/config.rs"
    api: []
    tests:
      - "torvox-core/tests/config_drift.rs"
      - "torvox-core/tests/config_integration.rs"
    verification: "cargo test --package torvox-core"

  # ==========================================================================
  # 3.4 Session Management (FR-026 — FR-032)
  # ==========================================================================

  FR-026:
    description: "The system SHALL spawn a child process (shell or custom executable) connected to a pseudo-terminal (PTY) via fork/exec."
    design:
      - "docs/architecture.md#2.3-torvox-terminal"
      - "torvox-terminal/src/pty.rs"
    api: []
    tests:
      - "torvox-terminal/tests/lifecycle_test.rs"
      - "torvox-terminal/tests/bash_integration.rs"
      - "torvox-terminal/tests/bash_comprehensive.rs"
    verification: "cargo test --package torvox-terminal"

  FR-027:
    description: "The system SHALL read PTY output on a dedicated reader thread and forward parsed output to the grid update pipeline via a flume channel."
    design:
      - "docs/architecture.md#2.3-torvox-terminal"
      - "docs/architecture.md#4-thread-model"
      - "docs/architecture.md#5.6-6-7-thread-model-per-session"
      - "torvox-terminal/src/session.rs"
    api: []
    tests:
      - "torvox-terminal/tests/concurrent_session.rs"
      - "torvox-terminal/tests/session_state_machine.rs"
      - "torvox-terminal/tests/dst_simulation.rs"
      - "torvox-terminal/tests/shuttle_concurrent.rs"
    verification: "cargo test --package torvox-terminal"

  FR-028:
    description: "The system SHALL wait for child process exit on a dedicated waiter thread and emit a ProcessExited event on termination."
    design:
      - "docs/architecture.md#2.3-torvox-terminal"
      - "docs/architecture.md#4-thread-model"
      - "torvox-terminal/src/session.rs"
    api: []
    tests:
      - "torvox-terminal/tests/lifecycle_test.rs"
      - "torvox-terminal/tests/dst_simulation.rs"
    verification: "cargo test --package torvox-terminal"

  FR-029:
    description: "The system SHALL support resizing a terminal session (changing rows and columns) and forwarding the new size to the child process via SIGWINCH."
    design:
      - "docs/architecture.md#2.2-torvox-core"
      - "docs/architecture.md#2.3-torvox-terminal"
      - "torvox-core/src/grid.rs"
      - "torvox-terminal/src/session.rs"
    api: []
    tests:
      - "torvox-terminal/tests/lifecycle_test.rs"
      - "torvox-core/tests/grid_ops.rs"
      - "fuzz/fuzz_targets/fuzz_grid_resize.rs"
    verification: "cargo test --package torvox-core && cargo test --package torvox-terminal"

  FR-030:
    description: "The system SHALL maintain a bounded scrollback buffer with a configurable maximum (default 50,000 lines), evicting oldest entries when the limit is exceeded."
    design:
      - "docs/architecture.md#2.2-torvox-core"
      - "torvox-core/src/grid.rs"
    api: []
    tests:
      - "torvox-terminal/tests/memory_bounds.rs"
      - "torvox-core/tests/grid_ops.rs"
      - "torvox-core/tests/grid_snapshot_integration.rs"
    verification: "cargo test --package torvox-core && cargo test --package torvox-terminal"

  FR-031:
    description: "The system SHALL support a scrollback search feature that finds text matching a pattern (regex or literal) within the scrollback history."
    design:
      - "docs/architecture.md#2.6-torvox-mcp"
      - "torvox-mcp/src/lib.rs"
    api:
      - "mcp-tool: read_grid"
      - "mcp-tool: read_scrollback"
      - "mcp-tool: scrollback_search"
    tests:
      - "torvox-mcp/src/lib.rs"
    verification: "cargo test --package torvox-mcp"

  FR-032:
    description: "The system SHALL clear the scrollback buffer when entering the alternate screen and restore it on exit."
    design:
      - "docs/architecture.md#2.2-torvox-core"
      - "torvox-core/src/grid.rs"
    api: []
    tests:
      - "torvox-terminal/tests/alt_screen.rs"
    verification: "cargo test --package torvox-terminal"

  # ==========================================================================
  # 3.5 OSC Sequence Handling (FR-033 — FR-038)
  # ==========================================================================

  FR-033:
    description: "The system SHALL intercept OSC 7 sequences and extract the current working directory path as a CwdEvent."
    design:
      - "docs/architecture.md#2.3-torvox-terminal"
      - "torvox-terminal/src/osc_handler.rs"
    api:
      - "mcp-tool: scroll_terminal"
    tests:
      - "torvox-terminal/tests/osc52.rs"
      - "fuzz/fuzz_targets/fuzz_osc_handler.rs"
      - "fuzz/fuzz_targets/fuzz_osc_parse.rs"
    verification: "cargo test --package torvox-terminal"

  FR-034:
    description: "The system SHALL intercept OSC 8 sequences and extract hyperlink open/close events as HyperlinkEvent."
    design:
      - "docs/architecture.md#2.3-torvox-terminal"
      - "torvox-terminal/src/osc_handler.rs"
    api:
      - "mcp-tool: read_clipboard"
    tests:
      - "torvox-terminal/tests/osc52.rs"
      - "fuzz/fuzz_targets/fuzz_osc_handler.rs"
    verification: "cargo test --package torvox-terminal"

  FR-035:
    description: "The system SHALL intercept OSC 52 sequences and decode clipboard content as a ClipboardEvent."
    design:
      - "docs/architecture.md#2.3-torvox-terminal"
      - "torvox-terminal/src/osc_handler.rs"
    api: []
    tests:
      - "torvox-terminal/tests/osc52.rs"
      - "fuzz/fuzz_targets/fuzz_osc_handler.rs"
    verification: "cargo test --package torvox-terminal"

  FR-036:
    description: "The system SHALL intercept OSC 9 (iTerm2) and OSC 777 (rxvt) sequences and extract notification title/body as NotificationEvent."
    design:
      - "docs/architecture.md#2.3-torvox-terminal"
      - "torvox-terminal/src/osc_handler.rs"
    api: []
    tests:
      - "fuzz/fuzz_targets/fuzz_osc_handler.rs"
    verification: "cargo test --package torvox-terminal"

  FR-037:
    description: "The system SHALL pass through unrecognised OSC sequences (e.g., OSC 0 for title, OSC 4 for palette change) to the VT parser unchanged."
    design:
      - "docs/architecture.md#2.3-torvox-terminal"
      - "torvox-terminal/src/osc_handler.rs"
    api:
      - "mcp-tool: list_directory"
      - "mcp-tool: read_file"
    tests:
      - "fuzz/fuzz_targets/fuzz_osc_parse.rs"
    verification: "cargo test --package torvox-terminal"

  FR-038:
    description: "The system SHALL handle partial OSC sequences that arrive split across multiple input chunks, accumulating state across process() calls."
    design:
      - "docs/architecture.md#2.3-torvox-terminal"
      - "torvox-terminal/src/osc_handler.rs"
    api:
      - "mcp-tool: list_directory"
      - "mcp-tool: read_file"
    tests:
      - "fuzz/fuzz_targets/fuzz_osc_handler.rs"
      - "fuzz/fuzz_targets/fuzz_osc_parse.rs"
    verification: "cargo test --package torvox-terminal"

  # ==========================================================================
  # 3.6 Clipboard and Notifications (FR-039 — FR-041)
  # ==========================================================================

  FR-039:
    description: "The system SHALL copy selected text to the system clipboard on user request (e.g., copy action from selection)."
    design:
