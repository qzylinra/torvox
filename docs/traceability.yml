  FR-040:
    description: "The system SHALL read clipboard content when requested by terminal applications via OSC 52 (paste)."
    design:
      - "docs/architecture.md#2.3-torvox-terminal"
      - "torvox-terminal/src/osc_handler.rs"
    api: []
    tests:
      - "torvox-terminal/tests/osc52.rs"
    verification: "cargo test --package torvox-terminal"

  FR-041:
    description: "The system SHALL display Android notifications for terminal-emitted OSC 9/777 notification sequences."
    design:
