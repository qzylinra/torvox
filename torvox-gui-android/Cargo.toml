[package]
name = "torvox-gui-android"
version = "0.1.0"
edition = "2024"
description = "Android JNI/UniFFI bridge for Torvox terminal UI"
license = "UNLICENSED"

[lib]
name = "torvox_android"
crate-type = ["cdylib", "lib"]

[dependencies]
torvox-core = { workspace = true }
torvox-terminal = { workspace = true }
torvox-renderer = { workspace = true }
uniffi = { workspace = true }
thiserror = { workspace = true }
raw-window-handle = { workspace = true }
