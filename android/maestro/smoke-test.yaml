appId: io.torvox
name: Torvox Smoke Test
---
- launchApp
- waitForAnimationToEnd
- assertVisible:
    id: TerminalTitle
- tapOn:
    id: SettingsButton
- assertVisible:
    id: SettingsScreen
- assertVisible:
    text: "Appearance"
- swipe:
    direction: UP
- assertVisible:
    text: "Terminal"
- tapOn:
    id: SettingsBackButton
- assertVisible:
    id: TerminalScreen
