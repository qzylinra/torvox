appId: io.torvox
name: Full Torvox Functional Test
---
# ========== 1. Launch & Verify Terminal ==========
- launchApp
- waitForAnimationToEnd:
    timeout: 10000
- assertVisible:
    id: TerminalScreen
- assertVisible:
    id: TerminalTitle
- assertVisible:
    id: SettingsButton
- takeScreenshot: 01_terminal_initial
# ========== 2. Test Terminal Command Input (via text) ==========
- tapOn:
    id: TerminalContent
- inputText: "echo 'hello world'\n"
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: 02_terminal_echo_output
- inputText: "ls\n"
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: 03_terminal_ls_output
# ========== 3. Navigate to Settings ==========
- tapOn:
    id: SettingsButton
- waitForAnimationToEnd:
    timeout: 5000
- assertVisible:
    id: SettingsScreen
# ========== 4. Verify Settings Sections ==========
- assertVisible:
    text: "Appearance"
- assertVisible:
    text: "Font Size"
- assertVisible:
    text: "Font Family"
- assertVisible:
    text: "Theme"
- assertVisible:
    text: "Theme Mode"
- takeScreenshot: 04_settings_top
- swipe:
    direction: DOWN
- waitForAnimationToEnd:
    timeout: 2000
- takeScreenshot: 05_settings_mid
- swipe:
    direction: DOWN
- waitForAnimationToEnd:
    timeout: 2000
- takeScreenshot: 06_settings_bottom
# ========== 5. Back to Terminal ==========
- swipe:
    direction: UP
- swipe:
    direction: UP
- tapOn:
    id: SettingsBackButton
- waitForAnimationToEnd:
    timeout: 3000
- assertVisible:
    id: TerminalScreen
- takeScreenshot: 07_back_to_terminal
# ========== 6. Test Modifier Keys (via coordinates for headless) ==========
- tapOn:
    point: "85%,92%" # ESC key area
- waitForAnimationToEnd:
    timeout: 2000
- tapOn:
    point: "30%,92%" # TAB key area
- waitForAnimationToEnd:
    timeout: 2000
- tapOn:
    point: "75%,92%" # CTRL key area
- tapOn:
    point: "75%,92%" # toggle off
- tapOn:
    point: "88%,92%" # ALT key area
- tapOn:
    point: "88%,92%" # toggle off
- tapOn:
    point: "28%,96%" # ← arrow
- tapOn:
    point: "40%,96%" # ↓ arrow
- tapOn:
    point: "50%,96%" # → arrow
- takeScreenshot: 08_modifier_keys_tested
# ========== 7. Test Session Drawer ==========
- tapOn:
    point: "73%,93%" # ☰ hamburger menu
- waitForAnimationToEnd:
    timeout: 3000
- takeScreenshot: 09_session_drawer
# close drawer by tapping outside
- tapOn:
    point: "10%,50%"
- waitForAnimationToEnd:
    timeout: 2000
- takeScreenshot: 10_terminal_final
